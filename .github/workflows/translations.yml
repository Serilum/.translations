name: translations

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'lang/**'
  push:
    branches: [main]
    paths:
      - 'lang/**'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/validate.py

  manifest:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 scripts/buildManifest.py
      - name: Commit manifest
        run: |
          git add manifest.json manifest.min.json
          if git diff --cached --quiet; then
            echo "manifest unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update translation manifest [skip ci]"
          git push
